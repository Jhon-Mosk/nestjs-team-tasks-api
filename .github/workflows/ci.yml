name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (coverage gate)
        run: npm run test:cov

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t team-task-management-api:ci .

  integration:
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Same images and bootstrap as local: `npm run docker:up:dev` (postgres + redis).
      # `--wait` blocks until compose healthchecks pass; `.env` is used by Compose and by tests.
      - name: Create .env for Docker Compose and tests
        run: |
          cat > .env <<'EOF'
          NODE_ENV=development
          PORT=3000
          POSTGRES_HOST=127.0.0.1
          POSTGRES_PORT=5432
          POSTGRES_USER=app
          POSTGRES_PASSWORD=secret
          POSTGRES_DB=mydb
          SHUTDOWN_TIMEOUT_MS=30000
          REDIS_PASSWORD=my_redis_password
          REDIS_USER=my_user
          REDIS_USER_PASSWORD=my_user_password
          REDIS_HOST=127.0.0.1
          REDIS_PORT=6379
          JWT_ACCESS_SECRET=ci_access_secret
          JWT_REFRESH_SECRET=ci_refresh_secret
          JWT_ACCESS_TTL_SEC=900
          JWT_REFRESH_TTL_SEC=604800
          TASKS_LIST_CACHE_TTL_SEC=300
          EOF

      - name: Start Postgres and Redis (docker compose)
        run: docker compose up -d --wait postgres redis

      - name: Create integration database
        run: |
          docker compose exec -e PGPASSWORD=secret -T postgres \
            psql -U app -d postgres -c "CREATE DATABASE mydb_integration;" || true

      - name: Run integration tests
        run: npm run test:integration
