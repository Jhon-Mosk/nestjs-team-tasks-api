name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (coverage gate)
        run: npm run test:cov

      - name: Build
        run: npm run build

  integration:
    runs-on: ubuntu-latest
    needs: unit

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mydb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d mydb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        env:
          PGPASSWORD: secret
        run: |
          for i in {1..30}; do
            psql -h postgres -U app -d postgres -c "select 1" && exit 0
            sleep 2
          done
          exit 1

      - name: Create integration database
        env:
          PGPASSWORD: secret
        run: |
          psql -h postgres -U app -d postgres -c "CREATE DATABASE mydb_integration;" || true

      - name: Generate env files for tests
        run: |
          cat > .env.development.local <<'EOF'
          NODE_ENV=development
          PORT=3000
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_USER=app
          POSTGRES_PASSWORD=secret
          POSTGRES_DB=mydb
          SHUTDOWN_TIMEOUT_MS=30000
          REDIS_PASSWORD=my_redis_password
          REDIS_USER=my_user
          REDIS_USER_PASSWORD=my_user_password
          REDIS_HOST=redis
          REDIS_PORT=6379
          JWT_ACCESS_SECRET=ci_access_secret
          JWT_REFRESH_SECRET=ci_refresh_secret
          JWT_ACCESS_TTL_SEC=900
          JWT_REFRESH_TTL_SEC=604800
          TASKS_LIST_CACHE_TTL_SEC=300
          EOF

      - name: Run integration tests
        run: npm run test:integration
